<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Burn</title>
    </head>
    <body>
        <div id="indev-notif">
            <span>Notice</span><span>This game is still in development!</span
            ><span
                >Don't expect everything to work perfectly (or at all) just
                yet.</span
            ><span>(Click to dismiss)</span>
        </div>
        <div id="splash" class="show">
            <h1>Burn</h1>
        </div>
        <div id="title-screen">
            <h1>Burn</h1>
            <button id="title-screen--play">Play</button>
            <button>Settings</button>
            <button>About</button>
        </div>
        <div id="ingame">
            <div id="goal">
                <span id="goal-name">Lower satellite apoapsis altitude</span>
                <ul>
                    <li>Do not crash into Earth</li>
                    <li>Do not fly off into space</li>
                </ul>
            </div>
            <div id="timecontrol">
                <div class="slider" style="--pos: 10%">
                    <div class="left"></div>
                    <div class="dot"></div>
                    <div class="right"></div>
                </div>
                <span>01 Jan 2000 12:00:00.000</span>
            </div>
        </div>
        <script type="module" src="/src/main.js"></script>
    </body>
</html>
