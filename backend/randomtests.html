<!doctype html>
<html>
    <head>
        <meta charset="utf8" />
        <title>Random Space Tests</title>
        <style>
            html {
                background: black;
            }
            canvas {
                position: fixed;
                left: 0;
                top: 0;
                width: 100vw;
                height: 100vh;
            }
        </style>
    </head>
    <body>
        <canvas width="500" height="500" id="canvas"></canvas>
        <script>
            const fov = 60
            function project2d(point) {
                // https://stackoverflow.com/a/76674734 Thank you person on StackOverflow for this math
                let scale = fov / (fov + point.z)

                return {
                    x: point.x * scale + canvas.width / 2,
                    y: point.y * scale + canvas.height / 2,
                }
            }
            let frame = 0
            fetch(
                "http://localhost:7744/spkpos?targ=moon&time=2000%20JAN%201%2000:00:00&obs=earth&interval=3600&intervalcount=2160",
            )
                .then((response) => response.json())
                .then(async (json) => {
                    setInterval(() => {
                        if (json.result.length - 1 > frame) {
                            frame += 2
                            render()
                        }
                    }, 1)
                    const canvas = document.getElementById("canvas")
                    canvas.width = innerWidth
                    canvas.height = innerHeight
                    const ctx = canvas.getContext("2d")
                    console.log(json)
                    const transform = {
                        x: 0,
                        y: 0,
                        z: 15,
                        rotate: {
                            x: 0,
                            y: 0,
                            z: 0,
                        },
                    }
                    setInterval(() => {
                        // transform.rotate.x += 0.01
                        // transform.rotate.y += 0.01
                        // transform.rotate.z += 0.01
                        render()
                    }, 1)
                    function doTransform(point) {
                        // point.y =
                        //     point.y * Math.sin(transform.rotate.x) -
                        //     point.z * Math.cos(transform.rotate.x)
                        // point.z =
                        //     point.y * Math.cos(transform.rotate.x) +
                        //     point.z * Math.sin(transform.rotate.x)
                        // point.x =
                        //     point.z * Math.sin(transform.rotate.y) +
                        //     point.x * Math.cos(transform.rotate.y)
                        // point.z =
                        //     point.z * Math.cos(transform.rotate.y) -
                        //     point.x * Math.sin(transform.rotate.y)
                        // point.x =
                        //     point.x * Math.cos(transform.rotate.z) -
                        //     point.y * Math.sin(transform.rotate.z)
                        // point.y =
                        //     point.x * Math.sin(transform.rotate.z) +
                        //     point.y * Math.cos(transform.rotate.z)
                        // point.z = Math.sin(transform.rotate.x)
                        // point.x *= Math.cos(transform.rotate.z)
                        // point.y *= Math.sin(transform.rotate.z)
                        point.x += transform.x
                        point.y += transform.y
                        point.z += transform.z
                        return point
                    }
                    function render() {
                        const divideBy = 4000
                        ctx.clearRect(0, 0, canvas.width, canvas.height)
                        ctx.lineWidth = 2
                        ctx.fillStyle = "white"
                        const earth = project2d({
                            x: transform.x,
                            y: transform.y,
                            z: transform.z,
                        })
                        const earthEdge = project2d({
                            x: transform.x + 6371 / divideBy,
                            y: transform.y,
                            z: transform.z,
                        })
                        if (earthEdge.x - earth.x > 0) {
                            ctx.beginPath()
                            ctx.ellipse(
                                earth.x,
                                earth.y,
                                earthEdge.x - earth.x,
                                earthEdge.x - earth.x,
                                0,
                                0,
                                Math.PI * 2,
                            )
                            ctx.fill()
                        }
                        // let center = doTransform({ x: 0, y: 0, z: 0 })
                        // let xLinePoint = doTransform({
                        //     x: 10,
                        //     y: 0,
                        //     z: 0,
                        // })
                        // let yLinePoint = doTransform({
                        //     x: 0,
                        //     y: -10,
                        //     z: 0,
                        // })
                        // let zLinePoint = doTransform({
                        //     x: 0,
                        //     y: 0,
                        //     z: -10,
                        // })
                        // let projectedCenter = project2d(center)
                        // let projectedXLine = project2d(xLinePoint)
                        // let projectedYLine = project2d(yLinePoint)
                        // let projectedZLine = project2d(zLinePoint)
                        // ctx.beginPath()
                        // ctx.moveTo(projectedCenter.x, projectedCenter.y)
                        // ctx.lineTo(projectedXLine.x, projectedXLine.y)
                        // ctx.strokeStyle = `rgb(255, 0, 0)`
                        // ctx.stroke()
                        // ctx.beginPath()
                        // ctx.moveTo(projectedCenter.x, projectedCenter.y)
                        // ctx.lineTo(projectedYLine.x, projectedYLine.y)
                        // ctx.strokeStyle = `rgb(0, 255, 0)`
                        // ctx.stroke()
                        // ctx.beginPath()
                        // ctx.moveTo(projectedCenter.x, projectedCenter.y)
                        // ctx.lineTo(projectedZLine.x, projectedZLine.y)
                        // ctx.strokeStyle = `rgb(0, 0, 255)`
                        // ctx.stroke()
                        for (
                            let i = 0;
                            i < json.result.length - 1 && i < frame;
                            i++
                        ) {
                            ctx.beginPath()
                            let pointA = doTransform({
                                x: json.result[i].x / divideBy,
                                y: json.result[i].y / divideBy,
                                z: json.result[i].z / divideBy,
                            })
                            let pointB = doTransform({
                                x: json.result[i + 1].x / divideBy,
                                y: json.result[i + 1].y / divideBy,
                                z: json.result[i + 1].z / divideBy,
                            })
                            if (-pointA.z > fov) continue
                            if (-pointB.z > fov) continue
                            let projectedA = project2d(pointA)
                            let projectedB = project2d(pointB)
                            ctx.moveTo(projectedA.x, projectedA.y)
                            ctx.lineTo(projectedB.x, projectedB.y)
                            ctx.strokeStyle = `hsl(${i * 2}deg, 100%, 50%)`
                            ctx.stroke()
                            // await new Promise((res) => setTimeout(res, 1))
                        }
                    }

                    addEventListener("mousemove", (ev) => {
                        // transform.x = ev.clientX - innerWidth / 2
                        // transform.y = ev.clientY - innerHeight / 2
                        if (ev.buttons & (1 == 1)) {
                            transform.x += ev.movementX
                            transform.y += ev.movementY
                        }
                        if (ev.shiftKey) {
                            transform.rotate.x -= ev.movementY / 100
                            transform.rotate.y -= ev.movementX / 100
                        }
                        render()
                    })
                    addEventListener("wheel", (ev) => {
                        transform.z += ev.deltaY
                        render()
                    })
                    render()
                })
        </script>
    </body>
</html>
