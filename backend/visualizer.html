<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>GMAT Visualizer</title>
        <style>
            html {
                background: black;
            }
            canvas {
                position: fixed;
                left: 0;
                top: 0;
                width: 100vw;
                height: 100vh;
            }
        </style>
    </head>
    <body>
        <canvas width="500" height="500" id="canvas"></canvas>
        <script>
            const fov = 60
            function project2d(point) {
                // https://stackoverflow.com/a/76674734 Thank you person on StackOverflow for this math
                let scale = fov / (fov + point.z)

                return {
                    x: point.x * scale + canvas.width / 2,
                    y: point.y * scale + canvas.height / 2,
                }
            }
            let frame = 0
            fetch("http://localhost:7755/calculate?script=test")
                .then((response) => response.text())
                .then(async (data) => {
                    const dataHeader = data.split("\n")[0].split(",")
                    const rows = data
                        .split("\n")
                        .slice(1)
                        .map((x) => x.split(","))
                    console.log(rows)

                    const canvas = document.getElementById("canvas")
                    canvas.width = innerWidth
                    canvas.height = innerHeight
                    const ctx = canvas.getContext("2d")
                    const transform = {
                        x: 0,
                        y: 0,
                        z: 15,
                        rotate: {
                            x: 0,
                            y: 0,
                            z: 0,
                        },
                    }
                    function doTransform(point) {
                        point.x += transform.x
                        point.y += transform.y
                        point.z += transform.z
                        return point
                    }
                    function render() {
                        const divideBy = 100
                        ctx.clearRect(0, 0, canvas.width, canvas.height)
                        ctx.lineWidth = 2
                        ctx.fillStyle = "white"
                        const earth = project2d({
                            x: transform.x,
                            y: transform.y,
                            z: transform.z,
                        })
                        const earthEdge = project2d({
                            x: transform.x + 6371 / divideBy,
                            y: transform.y,
                            z: transform.z,
                        })
                        if (earthEdge.x - earth.x > 0) {
                            ctx.beginPath()
                            ctx.ellipse(
                                earth.x,
                                earth.y,
                                earthEdge.x - earth.x,
                                earthEdge.x - earth.x,
                                0,
                                0,
                                Math.PI * 2,
                            )
                            ctx.fill()
                        }
                        // let center = doTransform({ x: 0, y: 0, z: 0 })
                        // let xLinePoint = doTransform({
                        //     x: 10,
                        //     y: 0,
                        //     z: 0,
                        // })
                        // let yLinePoint = doTransform({
                        //     x: 0,
                        //     y: -10,
                        //     z: 0,
                        // })
                        // let zLinePoint = doTransform({
                        //     x: 0,
                        //     y: 0,
                        //     z: -10,
                        // })
                        // let projectedCenter = project2d(center)
                        // let projectedXLine = project2d(xLinePoint)
                        // let projectedYLine = project2d(yLinePoint)
                        // let projectedZLine = project2d(zLinePoint)
                        // ctx.beginPath()
                        // ctx.moveTo(projectedCenter.x, projectedCenter.y)
                        // ctx.lineTo(projectedXLine.x, projectedXLine.y)
                        // ctx.strokeStyle = `rgb(255, 0, 0)`
                        // ctx.stroke()
                        // ctx.beginPath()
                        // ctx.moveTo(projectedCenter.x, projectedCenter.y)
                        // ctx.lineTo(projectedYLine.x, projectedYLine.y)
                        // ctx.strokeStyle = `rgb(0, 255, 0)`
                        // ctx.stroke()
                        // ctx.beginPath()
                        // ctx.moveTo(projectedCenter.x, projectedCenter.y)
                        // ctx.lineTo(projectedZLine.x, projectedZLine.y)
                        // ctx.strokeStyle = `rgb(0, 0, 255)`
                        // ctx.stroke()
                        for (let i = 0; i < rows.length - 1; i++) {
                            let pointA = doTransform({
                                x:
                                    parseFloat(
                                        rows[i][
                                            dataHeader.indexOf(
                                                "DefaultSC.EarthMJ2000Eq.X",
                                            )
                                        ],
                                    ) / divideBy,
                                y:
                                    parseFloat(
                                        rows[i][
                                            dataHeader.indexOf(
                                                "DefaultSC.EarthMJ2000Eq.Y",
                                            )
                                        ],
                                    ) / divideBy,
                                z:
                                    parseFloat(
                                        rows[i][
                                            dataHeader.indexOf(
                                                "DefaultSC.EarthMJ2000Eq.Z",
                                            )
                                        ],
                                    ) / divideBy,
                            })
                            let pointB = doTransform({
                                x:
                                    parseFloat(
                                        rows[i + 1][
                                            dataHeader.indexOf(
                                                "DefaultSC.EarthMJ2000Eq.X",
                                            )
                                        ],
                                    ) / divideBy,
                                y:
                                    parseFloat(
                                        rows[i + 1][
                                            dataHeader.indexOf(
                                                "DefaultSC.EarthMJ2000Eq.Y",
                                            )
                                        ],
                                    ) / divideBy,
                                z:
                                    parseFloat(
                                        rows[i + 1][
                                            dataHeader.indexOf(
                                                "DefaultSC.EarthMJ2000Eq.Z",
                                            )
                                        ],
                                    ) / divideBy,
                            })
                            if (-pointA.z > fov) continue
                            if (-pointB.z > fov) continue
                            let projectedA = project2d(pointA)
                            let projectedB = project2d(pointB)
                            if (
                                (Math.sqrt(
                                    (projectedA.x - earth.x) ** 2 +
                                        (projectedA.y - earth.y) ** 2,
                                ) <
                                    earthEdge.x - earth.x ||
                                    Math.sqrt(
                                        (projectedB.x - earth.x) ** 2 +
                                            (projectedB.y - earth.y) ** 2,
                                    ) <
                                        earthEdge.x - earth.x) &&
                                pointA.z > transform.z
                            ) {
                                continue
                            }
                            ctx.beginPath()
                            ctx.moveTo(projectedA.x, projectedA.y)
                            ctx.lineTo(projectedB.x, projectedB.y)
                            ctx.strokeStyle = `hsl(${i * 2}deg, 100%, 50%)`
                            ctx.stroke()
                            // await new Promise((res) => setTimeout(res, 1))
                        }
                    }

                    addEventListener("mousemove", (ev) => {
                        if ((ev.buttons & 1) == 1) {
                            transform.x += ev.movementX
                            transform.y += ev.movementY
                        }
                        if (ev.shiftKey) {
                            transform.rotate.x -= ev.movementY / 100
                            transform.rotate.y -= ev.movementX / 100
                        }
                        render()
                    })
                    addEventListener("wheel", (ev) => {
                        transform.z += ev.deltaY
                        render()
                    })
                    render()
                })
        </script>
    </body>
</html>
